<!--
  EmailJS TEMPLATE: "New Release Notification"
  ------------------------------------------------------------
  Paste this whole file into EmailJS → Email Templates → Create
  New Template → switch to "Code" / HTML view → paste here.
  Sent from Overview Studio's "Notify Subscribers" button
  (lib/emailjs.ts) whenever you publish a story and choose to
  announce it.

  Variables used:
    {{to_email}}        recipient
    {{story_title}}      "Siargao, Beyond the Surf"
    {{story_excerpt}}    one/two sentence teaser
    {{story_url}}        full link to the live story
    {{story_image}}      Cloudinary hero image URL
    {{story_category}}   e.g. "Travel"
    {{unsubscribe_note}} plain-text unsubscribe instructions

  Set the "To email" field in EmailJS to {{to_email}}.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{story_title}}</title>
</head>
<body style="margin:0; padding:0; background-color:#F4EFE6; font-family:Georgia, 'Times New Roman', serif;">
  <div style="display:none; max-height:0; overflow:hidden;">
    {{story_excerpt}}
  </div>

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#F4EFE6; padding:32px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" style="max-width:560px; background-color:#FFFFFF; border-radius:12px; overflow:hidden;" cellpadding="0" cellspacing="0">

          <!-- HEADER -->
          <tr>
            <td style="background-color:#17433F; padding:24px 32px; text-align:center;">
              <span style="font-family:Georgia, serif; font-size:20px; color:#F4EFE6; letter-spacing:0.5px;">
                Overview<span style="color:#C89A4B;">.</span>
              </span>
              <div style="font-family:Arial, sans-serif; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:#C89A4B; margin-top:4px;">
                New Release
              </div>
            </td>
          </tr>

          <!-- HERO IMAGE -->
          <tr>
            <td>
              <a href="{{story_url}}" style="display:block;">
                <img src="{{story_image}}" alt="{{story_title}}" width="560" style="width:100%; display:block;">
              </a>
            </td>
          </tr>

          <!-- BODY -->
          <tr>
            <td style="padding:28px 32px 8px;">
              <span style="display:inline-block; font-family:Arial, sans-serif; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#C89A4B; font-weight:bold; margin-bottom:10px;">
                {{story_category}}
              </span>
              <h1 style="font-family:Georgia, serif; font-size:24px; line-height:1.3; color:#17433F; margin:0 0 14px;">
                {{story_title}}
              </h1>
              <p style="font-family:Arial, sans-serif; font-size:14px; line-height:1.7; color:#2E3F3B; margin:0 0 24px;">
                {{story_excerpt}}
              </p>
              <table role="presentation" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="background-color:#C89A4B; border-radius:999px;">
                    <a href="{{story_url}}" style="display:inline-block; padding:12px 28px; font-family:Arial, sans-serif; font-size:13px; font-weight:bold; color:#17433F; text-decoration:none;">
                      Read the Full Story
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td style="padding:28px 32px; border-top:1px solid #EEE6D8; margin-top:20px;">
              <p style="font-family:Arial, sans-serif; font-size:11px; line-height:1.6; color:#8A8A8A; margin:0 0 6px;">
                {{unsubscribe_note}}
              </p>
              <p style="font-family:Arial, sans-serif; font-size:11px; line-height:1.6; color:#8A8A8A; margin:0;">
                Overview PH · Philippines &nbsp;·&nbsp;
                <a href="mailto:hello@overviewph.com?subject=Unsubscribe" style="color:#8A8A8A;">Unsubscribe</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
